<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mis Hábitos">
  <title>Mis Hábitos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root {
      --bg: #0d0d0d; --bg2: #1a1a1a; --bg3: #242424;
      --text: #f0f0f0; --text2: #888;
      --green: #1D9E75; --green-dark: #0F6E56;
      --amber: #EF9F27; --border: rgba(255,255,255,0.08);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .month-label { font-size: 22px; font-weight: 600; }
    .view-toggle { display: flex; gap: 6px; background: var(--bg2); padding: 4px; border-radius: 10px; }
    .view-btn { padding: 6px 14px; border-radius: 8px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .view-btn.active { background: var(--green); color: #fff; }
    .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); margin-bottom: 1rem; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
    .sync-dot.error { background: #E24B4A; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 0.875rem; }
    .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 600; }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }
    .progress-bar { height: 5px; background: var(--bg3); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s; }
    .section-title { font-size: 12px; color: var(--text2); margin-bottom: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .daily-view { display: none; }
    .daily-view.show { display: block; }
    .circle-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 1.25rem; }
    .circle-wrap svg { transform: rotate(-90deg); }
    .circle-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    .circle-pct { font-size: 24px; font-weight: 700; }
    .circle-sub { font-size: 11px; color: var(--text2); }
    .habit-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .habit-row:last-child { border-bottom: none; }
    .habit-check { width: 30px; height: 30px; border-radius: 9px; border: 2px solid var(--bg3); background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .habit-check.done { background: var(--green); border-color: var(--green); }
    .habit-check i { font-size: 16px; color: #fff; opacity: 0; transition: opacity 0.2s; }
    .habit-check.done i { opacity: 1; }
    .habit-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; color: var(--text2); }
    .habit-info { flex: 1; }
    .habit-name { font-size: 15px; font-weight: 500; transition: all 0.2s; }
    .habit-name.done { text-decoration: line-through; color: var(--text2); }
    .habit-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .monthly-view { display: none; }
    .monthly-view.show { display: block; }
    .month-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
    .month-grid { display: flex; flex-direction: column; gap: 4px; min-width: 520px; }
    .habit-month-name { font-size: 11px; color: var(--text2); text-align: right; padding-right: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-cell { width: 17px; height: 17px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
    .day-cell.done { background: var(--green); border-color: var(--green-dark); }
    .day-cell.done-amber { background: var(--amber); border-color: #BA7517; }
    .day-cell.today-cell { border: 2px solid var(--green); }
    .day-cell.future { opacity: 0.2; cursor: default; }
    .day-num { font-size: 8px; color: var(--text2); text-align: center; width: 17px; }
    .motivation { background: var(--green-dark); border-radius: var(--radius); padding: 1rem 1.25rem; margin-top: 1.5rem; }
    .motivation p { font-size: 14px; line-height: 1.6; color: #c8efe3; }
    .motivation .author { font-size: 12px; color: #9FE1CB; margin-top: 6px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="month-label">Mayo 2026</div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="switchView('daily')">Hoy</button>
      <button class="view-btn" onclick="switchView('monthly')">Mes</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot syncing" id="sync-dot"></div>
    <span id="sync-label">Conectando...</span>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Hoy</div>
      <div class="stat-value green" id="done-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hábitos</div>
      <div class="stat-value">6</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Racha</div>
      <div class="stat-value amber" id="streak-count">0 🔥</div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="daily-view show" id="daily-view">
    <div style="text-align:center;margin-bottom:1.25rem;">
      <div class="circle-wrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="46" fill="none" stroke="#242424" stroke-width="9"/>
          <circle cx="55" cy="55" r="46" fill="none" stroke="#1D9E75" stroke-width="9"
            stroke-dasharray="289" id="circle-progress" stroke-dashoffset="289" stroke-linecap="round"/>
        </svg>
        <div class="circle-text">
          <div class="circle-pct" id="circle-pct">0%</div>
          <div class="circle-sub">hoy</div>
        </div>
      </div>
    </div>
    <div class="section-title">Hábitos del día</div>
    <div id="habits-list"></div>
  </div>

  <div class="monthly-view" id="monthly-view">
    <div class="section-title">Mayo — toca cualquier celda para marcar</div>
    <div class="month-scroll">
      <div class="month-grid" id="month-grid"></div>
    </div>
  </div>

  <div class="motivation">
    <p>"Tienes metas reales: tu marca, tu PC, tu apartamento, casarte. Cada hábito de hoy es un ladrillo de esa vida."</p>
    <div class="author">— Tu tracker</div>
  </div>
</div>

<script>
const SB_URL = 'https://sdcyogmxiuyhxdojxcsb.supabase.co/rest/v1/;
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkY3lvZ214aXV5aHhkb2p4Y3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTQ0MTgsImV4cCI6MjA5NTIzMDQxOH0.wVswZkbWz_wNxNTLZZMe8mBIElv4i7xutnHJ15R7PNw';
const HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };

const HABITS = [
  { id: 'leer',      name: 'Leer / educarse',       icon: 'ti-book',             color: 'green' },
  { id: 'videos',    name: 'Editar / grabar video',  icon: 'ti-video',            color: 'green' },
  { id: 'mkt',       name: 'Marketing e IA',         icon: 'ti-brain',            color: 'amber' },
  { id: 'ejercicio', name: 'Ejercicio',              icon: 'ti-run',              color: 'green' },
  { id: 'redes',     name: 'Sin redes sociales',     icon: 'ti-device-mobile-off',color: 'amber' },
  { id: 'planificar',name: 'Planificar el día',      icon: 'ti-list-check',       color: 'green' },
];

const TODAY = new Date();
const DAY = TODAY.getDate();
const DAYS = 31;
const pad = d => String(d).padStart(2, '0');
const TODAY_STR = '2026-05-' + pad(DAY);
let state = {};

function setSyncStatus(s, text) {
  document.getElementById('sync-dot').className = 'sync-dot' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
  document.getElementById('sync-label').textContent = text;
}

async function fetchHabits() {
  setSyncStatus('syncing', 'Cargando hábitos...');
  try {
    const url = SB_URL + '/rest/v1/habitos?select=fecha,habit_id,completado';
    const res = await fetch(url, { headers: HEADERS });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    state = {};
    data.forEach(r => { if (r.completado) state[r.fecha + '_' + r.habit_id] = true; });
    setSyncStatus('ok', 'Sincronizado ✓');
    renderAll();
  } catch(e) {
    console.error('Fetch error:', e);
    setSyncStatus('error', 'Error: ' + e.message);
    setTimeout(fetchHabits, 5000);
  }
}

async function upsert(dateStr, habitId, val) {
  setSyncStatus('syncing', 'Guardando...');
  try {
    const url = SB_URL + '/rest/v1/habitos';
    const res = await fetch(url, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ fecha: dateStr, habit_id: habitId, completado: val })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncStatus('ok', 'Guardado ✓');
  } catch(e) {
    setSyncStatus('error', 'Error al guardar: ' + e.message);
  }
}

function toggleHabit(id) {
  const key = TODAY_STR + '_' + id;
  state[key] = !state[key];
  renderAll();
  upsert(TODAY_STR, id, state[key]);
}

function toggleCell(id, day) {
  if (day > DAY) return;
  const ds = '2026-05-' + pad(day);
  const key = ds + '_' + id;
  state[key] = !state[key];
  renderAll();
  upsert(ds, id, state[key]);
}

function renderStats() {
  const done = HABITS.filter(h => state[TODAY_STR + '_' + h.id]).length;
  const pct = Math.round(done / HABITS.length * 100);
  document.getElementById('done-count').textContent = done;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('circle-pct').textContent = pct + '%';
  document.getElementById('circle-progress').style.strokeDashoffset = 289 - (pct / 100) * 289;
  let streak = 0;
  for (let d = DAY; d >= 1; d--) {
    const ds = '2026-05-' + pad(d);
    if (HABITS.every(h => state[ds + '_' + h.id])) streak++;
    else break;
  }
  document.getElementById('streak-count').textContent = streak + ' 🔥';
}

function renderDailyHabits() {
  document.getElementById('habits-list').innerHTML = HABITS.map(h => {
    const done = !!state[TODAY_STR + '_' + h.id];
    return `<div class="habit-row" onclick="toggleHabit('${h.id}')">
      <div class="habit-check ${done ? 'done' : ''}"><i class="ti ti-check"></i></div>
      <div class="habit-icon"><i class="ti ${h.icon}"></i></div>
      <div class="habit-info">
        <div class="habit-name ${done ? 'done' : ''}">${h.name}</div>
        <div class="habit-sub">${done ? '¡Completado hoy!' : 'Pendiente'}</div>
      </div>
    </div>`;
  }).join('');
}

function renderMonthGrid() {
  const dayNums = '<div style="display:grid;grid-template-columns:80px repeat(' + DAYS + ',17px);gap:3px;margin-bottom:3px;"><div></div>'
    + Array.from({length:DAYS},(_,i) => '<div class="day-num">' + (i+1) + '</div>').join('') + '</div>';
  const rows = HABITS.map(h => {
    const cells = Array.from({length:DAYS}, (_,i) => {
      const d = i + 1;
      const ds = '2026-05-' + pad(d);
      const done = !!state[ds + '_' + h.id];
      const isToday = d === DAY;
      const isFuture = d > DAY;
      let cls = 'day-cell';
      if (done) cls += h.color === 'amber' ? ' done-amber' : ' done';
      if (isToday) cls += ' today-cell';
      if (isFuture) cls += ' future';
      return '<div class="' + cls + '" onclick="toggleCell(\'' + h.id + '\',' + d + ')"></div>';
    }).join('');
    return '<div style="display:grid;grid-template-columns:80px repeat(' + DAYS + ',17px);gap:3px;align-items:center;">'
      + '<div class="habit-month-name">' + h.name + '</div>' + cells + '</div>';
  }).join('');
  document.getElementById('month-grid').innerHTML = dayNums + rows;
}

function renderAll() { renderStats(); renderDailyHabits(); renderMonthGrid(); }

function switchView(view) {
  document.getElementById('daily-view').classList.toggle('show', view === 'daily');
  document.getElementById('monthly-view').classList.toggle('show', view === 'monthly');
  document.querySelectorAll('.view-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&view==='daily')||(i===1&&view==='monthly'));
  });
}

fetchHabits();
</script>
</body>
</html>
